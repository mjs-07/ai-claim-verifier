services:
  - type: web
    name: ai-claim-verifier
    runtime: python

    buildCommand: |
      pip install -r requirements.txt

    startCommand: |
      uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13

      - key: SERPER_API_KEY
        sync: false