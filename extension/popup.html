<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light dark">
<title>AI Claim Verifier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="popup.css">
</head>
<body>

  <header class="app-header">
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="26" height="26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2.5 4 5.8v5.6c0 5.1 3.4 9.6 8 10.9 4.6-1.3 8-5.8 8-10.9V5.8L12 2.5Z" fill="url(#shieldGrad)"/>
        <path d="m8.6 12.2 2.4 2.4 4.6-4.8" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <defs>
          <linearGradient id="shieldGrad" x1="4" y1="2.5" x2="20" y2="22" gradientUnits="userSpaceOnUse">
            <stop stop-color="#F97316"/>
            <stop offset="1" stop-color="#059669"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="header-text">
      <h1>AI Claim Verifier</h1>
      <p class="tagline">Verify facts. Trust with evidence.</p>
    </div>

    <button
      id="themeToggle"
      class="theme-toggle"
      type="button"
      role="switch"
      aria-checked="false"
      aria-label="Switch to dark theme"
      title="Toggle light / dark theme"
    >
      <span class="toggle-track">
        <svg class="toggle-icon icon-sun" width="11" height="11" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="2"/>
          <path d="M12 2.5v2.4M12 19.1v2.4M4.9 4.9l1.7 1.7M17.4 17.4l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.9 19.1l1.7-1.7M17.4 6.6l1.7-1.7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <svg class="toggle-icon icon-moon" width="11" height="11" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a6.8 6.8 0 0 0 10.5 10.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        </svg>
        <span class="toggle-thumb"></span>
      </span>
    </button>
  </header>

  <main id="app">

    <button id="analyzeBtn" class="primary-btn" type="button">
      <svg class="btn-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
        <path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="btn-label">Analyze Selected Text</span>
    </button>

    <div id="results" aria-live="polite"></div>

  </main>

  <footer class="app-footer">
    <span class="footer-item">
      <span class="status-dot" id="backendStatus" aria-hidden="true"></span>
      Backend connected
    </span>
    <span class="footer-item version">v1.0</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
